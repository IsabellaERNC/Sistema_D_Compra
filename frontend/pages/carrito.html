<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <header>
        <div class="nav-izq">
            <h1>🛒 Mi Carrito</h1>
        </div>

        <div class="nav-der">
            <a href="../index.html" class="nav-link">← Seguir comprando</a>

            <div id="auth-nav-btn"></div>
        </div>
    </header>

    <div id="auth-modal">
        <div class="modal-contenido">
            <button class="modal-cerrar" onclick="cerrarModal()">✕</button>

            <p class="modal-titulo">Para continuar al pago</p>

            <div class="modal-tabs">
                <button id="tab-login"    class="tab-activo" onclick="cambiarTab('login')">
                    Iniciar sesión
                </button>
                <button id="tab-register" onclick="cambiarTab('register')">
                    Registrarse
                </button>
            </div>

            <div id="form-login">
                <div id="error-login" class="error-msg"></div>

                <div class="campo">
                    <label for="login-email">Correo electrónico</label>
                    <input type="email" id="login-email" placeholder="tu@correo.com">
                </div>
                <div class="campo">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button id="btn-login-submit" class="btn-submit" onclick="handleLogin()">
                    Ingresar y pagar
                </button>
                <p class="cambiar-tab">
                    ¿No tienes cuenta?
                    <a onclick="cambiarTab('register')">Regístrate gratis</a>
                </p>
            </div>

            <div id="form-register" style="display:none;">
                <div id="error-register" class="error-msg"></div>

                <div class="campo">
                    <label for="reg-nombre">Nombre completo</label>
                    <input type="text" id="reg-nombre" placeholder="Nicolás García">
                </div>
                <div class="campo">
                    <label for="reg-email">Correo electrónico</label>
                    <input type="email" id="reg-email" placeholder="tu@correo.com">
                </div>
                <div class="campo">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="campo">
                    <label for="reg-confirm">Confirmar contraseña</label>
                    <input type="password" id="reg-confirm" placeholder="Repite tu contraseña">
                </div>
                <button id="btn-register-submit" class="btn-submit" onclick="handleRegister()">
                    Crear cuenta y pagar
                </button>
                <p class="cambiar-tab">
                    ¿Ya tienes cuenta?
                    <a onclick="cambiarTab('login')">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>

    <main>
        <div id="lista-carrito"></div>

        <div id="resumen">
            <h3>Total: <span id="total">$0</span></h3>
            <button id="btn-vaciar" onclick="vaciarCarrito()">Vaciar carrito</button>
            <button id="btn-pagar"  onclick="intentarPagar()">Proceder al pago</button>
        </div>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/carrito.js"></script>

    <script>
        function intentarPagar() {
            if (carrito.length === 0) {
                alert('Tu carrito está vacío. Agrega productos antes de pagar.');
                return;
            }

            if (!isLoggedIn()) {
                abrirModal('login');
            } else {
                irAPagar();
            }
        }

        function onLoginExitoso() {
            renderAuthNav();        
            irAPagar();             
        }

        function irAPagar() {
            window.location.href = 'confirmacion.html';
        }
    </script>
</body>
</html>
